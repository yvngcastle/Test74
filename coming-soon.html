<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Coming Soon</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #080808;
      color: #fff;
      font-family: 'Inter', sans-serif;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .orb {
      position: fixed;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,255,255,0.04) 0%, transparent 70%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      animation: breathe 4s ease-in-out infinite;
      pointer-events: none;
    }
    @keyframes breathe {
      0%, 100% { transform: translate(-50%, -50%) scale(1);   opacity: 0.5; }
      50%       { transform: translate(-50%, -50%) scale(1.3); opacity: 1;   }
    }

    .ring {
      position: fixed;
      width: 340px;
      height: 340px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.06);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      animation: spin 18s linear infinite;
    }
    .ring::after {
      content: '';
      position: absolute;
      width: 5px;
      height: 5px;
      background: #fff;
      border-radius: 50%;
      top: -3px;
      left: 50%;
      transform: translateX(-50%);
      box-shadow: 0 0 10px 2px rgba(255,255,255,0.6);
    }
    .ring-2 {
      width: 260px;
      height: 260px;
      border-color: rgba(255,255,255,0.04);
      animation: spin 12s linear infinite reverse;
    }
    .ring-2::after {
      width: 3px;
      height: 3px;
      top: -2px;
      box-shadow: 0 0 6px 1px rgba(255,255,255,0.4);
    }
    @keyframes spin { to { transform: translate(-50%, -50%) rotate(360deg); } }

    .content {
      position: relative;
      z-index: 10;
      text-align: center;
    }

    .label {
      font-size: 10px;
      font-weight: 300;
      letter-spacing: 0.5em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.25);
      margin-bottom: 28px;
      opacity: 0;
      animation: rise 1.2s ease forwards 0.5s;
    }

    h1 {
      font-size: clamp(36px, 6vw, 72px);
      font-weight: 200;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.9);
      opacity: 0;
      animation: rise 1.2s ease forwards 0.8s;
    }

    .line {
      width: 1px;
      height: 0;
      background: rgba(255,255,255,0.15);
      margin: 36px auto;
      animation: grow-line 1s ease forwards 1.4s;
    }
    @keyframes grow-line { to { height: 48px; } }

    .sub {
      font-size: 12px;
      font-weight: 300;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.2);
      opacity: 0;
      animation: rise 1.2s ease forwards 1.6s;
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .dots {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin-top: 52px;
      opacity: 0;
      animation: rise 1s ease forwards 2s;
    }
    .dot {
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: rgba(255,255,255,0.3);
      animation: pulse-dot 1.4s ease-in-out infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes pulse-dot {
      0%, 100% { background: rgba(255,255,255,0.15); transform: scale(1);   }
      50%       { background: rgba(255,255,255,0.7);  transform: scale(1.4); }
    }
  </style>
</head>
<body>
  <div class="orb"></div>
  <div class="ring"></div>
  <div class="ring ring-2"></div>

  <div class="content">
    <p class="label">We're working on it</p>
    <h1>Coming Soon</h1>
    <div class="line"></div>
    <p class="sub">Something is on its way</p>
    <div class="dots">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
  </div>
</body>
</html>
